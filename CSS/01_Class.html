<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector</title>
    <style>
    .Demo{
             color: brown;
             background-color: aqua;
    }
    .Demo1{
          background-color: blueviolet;
          color: aqua;
          font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    .class{
        display: inline-block;
    }
    </style>
</head>
<body>
    <div class="Demo">Hello ,Fork Infosystem</div><br>
    <div></div>
   <!-- <div class="Demo"></div> -->
   <main>
    <div class="Demo">Lorem ipsum dolor sit amet.</div>
   </main>

   <section>
    <div class="Demo1">Hello</div>
   </section>

   <div class="class">Home</div>
   <div class="class">About</div>
   <div class="class">Contact</div>
</body>
</html>
