<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags Demo</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
        }

        header{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }

        nav{
            background-color: lightgreen;
            padding: 10px;
            text-align: center;
        }

        nav a{
            text-decoration: none;
            margin: 10px;
            color: black;
        }

        section{
            background-color: lightyellow;
            padding: 20px;
            margin: 10px;
            border: 2px solid black;
        }

        article{
            background-color: lightgray;
            padding: 15px;
            margin-top: 10px;
        }

        main{
            background-color: pink;
            padding: 15px;
            margin: 10px;
        }

        footer{
            background-color: lightcoral;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="">Home</a>
        <a href="">about</a>
        <a href="">Contact</a>
        <a href="">Location</a>
    </nav>

    <section>
 
        <h2>Web Development</h2>
      
        <article>
            <h3>HTML</h3>
              <span>HTML is used to create web pages.</span>
        </article>
       
        <article>
            <h2>CSS</h2>
            <p>CSS is used for styling web pages.</p>
        </article>

        <article>
            <h2>JavaScript</h2>
            <p>Lorem ipsum dolor sit amet.</p>
        </article>
    </section>

    <main>
        <h3>Latest News</h3>
        <p>New CSS features released.</p>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
