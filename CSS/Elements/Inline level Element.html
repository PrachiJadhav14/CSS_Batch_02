<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            border: 1px solid black;
        }
        div{
            border: 1px solid black;
        }
    </style>
</head>
<body>
     <!-- inline level element -->
     <span style="border: 1px solid black;">Lorem ipsum dolor sit amet consectetur.</span><br>
     <b style="border: 1px solid red;">Lorem ipsum dolor sit amet consectetur adipisicing elit. Culpa, eveniet.</b><br>
     <i style="border: 1px solid red;">Lorem ipsum dolor sit amet.</i>

          <!-- Block Level Element -->
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Sit, saepe?</p>
     
    <div>Lorem ipsum dolor sit amet.</div>
</body>
</html>
